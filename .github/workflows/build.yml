name: Build OpenList Android APK

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      openlist_version:
        description: 'OpenList release tag (e.g. beta)'
        required: false
        default: 'beta'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Download OpenList binaries
        env:
          OPENLIST_TAG: ${{ github.event.inputs.openlist_version || 'beta' }}
        run: |
          chmod +x download-binaries.sh
          # 覆盖脚本中的 tag
          sed -i "s|releases/download/beta|releases/download/${OPENLIST_TAG}|g" download-binaries.sh
          ./download-binaries.sh

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: OpenList-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: OpenList-release-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create Release (on main push, tag only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "BUILD_TAG=v1.0.0-${TIMESTAMP}-${SHORT_SHA}" >> $GITHUB_ENV

      - name: Upload to GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BUILD_TAG }}
          name: "OpenList Android ${{ env.BUILD_TAG }}"
          body: |
            ## OpenList Android App 自动构建

            - **构建时间**: ${{ github.event.head_commit.timestamp }}
            - **提交**: ${{ github.sha }}
            - **OpenList 版本**: ${{ github.event.inputs.openlist_version || 'beta' }}

            ### 安装说明
            1. 下载 `OpenList-debug-*.apk` 文件
            2. 传输到 Android 手机
            3. 在设置中开启"允许安装未知来源应用"
            4. 点击安装
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
